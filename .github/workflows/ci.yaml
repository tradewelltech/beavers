name: beavers CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
      fail-fast: false
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.1"
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --extra pyarrow --extra confluent-kafka --extra polars

      - name: Run tests
        run: uv run coverage run --source=beavers --rcfile=pyproject.toml --branch -m pytest tests

      - name: Run examples
        run: |
          uv run python examples/advanced_concepts.py
          uv run python examples/dag_concepts.py
          uv run python examples/etfs.py
          uv run python examples/polars_concepts.py
          uv run python examples/pyarrow_concepts.py
          uv run python examples/replay_concepts.py

      - name: Check coverage
        run: |
          uv run coverage report --rcfile=pyproject.toml -m --fail-under 95
          uv run coverage xml --rcfile=pyproject.toml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: "matrix.python == '3.12'"
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python:
          - "3.12"

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.1"
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Cache pre-commit hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ matrix.python }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run prek
        run: uvx prek run --all-files --show-diff-on-failure
