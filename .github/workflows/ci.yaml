name: beavers CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
      fail-fast: false
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --group dev --extra pyarrow --extra confluent-kafka --extra polars

      - name: Run tests
        run: uv run coverage run --source=beavers --rcfile=pyproject.toml --branch -m pytest tests

      - name: Run examples
        run: |
          uv run python examples/advanced_concepts.py
          uv run python examples/dag_concepts.py
          uv run python examples/etfs.py
          uv run python examples/polars_concepts.py
          uv run python examples/pyarrow_concepts.py
          uv run python examples/replay_concepts.py

      - name: Check coverage
        run: |
          uv run coverage report --rcfile=pyproject.toml -m --fail-under 95
          uv run coverage xml --rcfile=pyproject.toml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: "matrix.python-version == '3.10'"
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.10

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure
